# Package and upload VSCode extension after a release is published
# This workflow runs separately from the cargo-dist managed release.yml

name: VSCode Extension Release
permissions:
  contents: write
  attestations: read

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  package-vscode:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # A semver prerelease suffix (e.g. v0.9.1-pre.1) selects the beta
          # channel: the GitHub release is marked prerelease by cargo-dist and
          # the extension is published to the Marketplace as a pre-release.
          # The Marketplace only accepts plain major.minor.patch versions, so
          # the extension version is the tag with the suffix stripped; every
          # beta tag therefore needs a unique base version (bump the patch).
          EXTENSION_VERSION="${VERSION%%-*}"
          if [ "$VERSION" != "$EXTENSION_VERSION" ]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          if ! echo "$EXTENSION_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '$EXTENSION_VERSION' is not a plain major.minor.patch version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "extension_version=$EXTENSION_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Found tag: $TAG, version: $VERSION, extension: $EXTENSION_VERSION, prerelease: $PRERELEASE"

      - name: Wait for release to be created
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Waiting for release $TAG to be created by cargo-dist..."
          
          for i in {1..180}; do
            if gh release view "$TAG" &>/dev/null; then
              echo "Release $TAG found"
              break
            fi
            if [ $i -eq 180 ]; then
              echo "Error: Release $TAG not found after 30 minutes"
              exit 1
            fi
            echo "Attempt $i: Release not found, waiting 10 seconds..."
            sleep 10
          done
          
          # Additional wait for artifacts to be uploaded
          echo "Waiting for artifacts to be uploaded..."
          sleep 30

      - name: Download release artifacts
        run: |
          mkdir -p target/distrib/
          gh release download "${{ steps.version.outputs.tag }}" --pattern "*.tar.xz" --pattern "*.zip" --dir target/distrib/
          
          # Verify artifacts were downloaded
          if ! ls target/distrib/*.tar.xz 1> /dev/null 2>&1; then
            echo "Error: No .tar.xz artifacts found in release"
            exit 1
          fi

      - name: Verify artifact attestations
        run: |
          for file in target/distrib/*.tar.xz; do
            echo "Verifying attestation for $file"
            gh attestation verify "$file" --owner ${{ github.repository_owner }}
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TypeScript client dependencies
        working-directory: tycode-client-typescript
        run: npm ci

      - name: Install VSCode extension dependencies
        working-directory: tycode-vscode
        run: npm ci

      - name: Collect binaries from cargo-dist artifacts
        working-directory: tycode-vscode
        run: npm run collect-binaries:ci

      - name: Set extension version from tag
        working-directory: tycode-vscode
        run: |
          # The Marketplace version comes from the tag (suffix stripped), not
          # from whatever package.json happened to contain at tag time.
          npm version "${{ steps.version.outputs.extension_version }}" \
            --no-git-tag-version --allow-same-version

      - name: Package VSCode extension
        working-directory: tycode-vscode
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            npm run package:ci -- --pre-release
          else
            npm run package:ci
          fi

      - name: Upload VSCode extension to release
        run: |
          VSIX_FILE=$(ls tycode-vscode/*.vsix 2>/dev/null | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No .vsix file found in tycode-vscode/"
            exit 1
          fi
          gh release upload "${{ steps.version.outputs.tag }}" "$VSIX_FILE" --clobber

      - name: Publish to VS Code Marketplace
        working-directory: tycode-vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX_FILE=$(ls *.vsix 2>/dev/null | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No .vsix file found"
            exit 1
          fi
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            echo "Publishing $VSIX_FILE to VS Code Marketplace as a PRE-RELEASE..."
            npx vsce publish --packagePath "$VSIX_FILE" --pre-release
          else
            echo "Publishing $VSIX_FILE to VS Code Marketplace..."
            npx vsce publish --packagePath "$VSIX_FILE"
          fi

      - name: Upload VSCode extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: tycode-vscode/*.vsix
